name: Production Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: production-release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: synapse-backend
            context: ./backend
          - name: synapse-frontend
            context: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # GHCR requires lowercase owner; this avoids "Invalid Reference Format" errors.
      - name: Lowercase repository owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # Essential for ARM64 (Apple Silicon) + AMD64 (Cloud) support
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.image.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Fixes "unsupported media type" error for local Docker pulls
          # by moving provenance to an external attestation instead of the manifest.
          provenance: false
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.image.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  release:
    name: Create GitHub Release
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Lowercase repository owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Synapse ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## 🏗️ System Architecture
            - **Backend:** FastAPI / Python 
            - **Frontend:** React / TypeScript
            - **Platforms:** `linux/amd64`, `linux/arm64` (Apple Silicon compatible)

            ## 📦 Container Images

            Pull the latest images for this release:

            ```bash
            docker pull ghcr.io/${{ steps.owner.outputs.value }}/synapse-backend:${{ github.ref_name }}
            docker pull ghcr.io/${{ steps.owner.outputs.value }}/synapse-frontend:${{ github.ref_name }}
            ```

            **Note:** If you encounter manifest errors locally, ensure Docker Desktop has the **containerd image store** enabled in Settings.

            **Verify build integrity:**
            ```bash
            gh attestation verify oci://ghcr.io/${{ steps.owner.outputs.value }}/synapse-backend:${{ github.ref_name }} --owner ${{ steps.owner.outputs.value }}
            ```
