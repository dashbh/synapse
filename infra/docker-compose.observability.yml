# Synapse Observability Sidecar — LGTM Stack
#
# Usage (dev):
#   docker compose \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.observability.yml \
#     --profile dev up
#
# Grafana:    http://localhost:3001   (anonymous admin, no login)
# Prometheus: http://localhost:9090
# Loki:       http://localhost:3100
# Tempo:      http://localhost:3200
#
# Network design:
#   default      = a2uiplatform-net (defined in docker-compose.yml)
#                  All app services (frontend-dev, backend-dev) live here.
#                  otel-collector and prometheus also join so they can reach
#                  backend-dev by hostname without touching the base file.
#   observability = internal bridge for Loki/Tempo/Grafana/Collector inter-talk.

services:

  # ── OTel Collector (single ingest point) ───────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"   # gRPC OTLP receiver (backend → collector)
      - "4318:4318"   # HTTP OTLP receiver (alternative)
      - "8888:8888"   # Collector self-metrics (Prometheus scrape)
    networks:
      - default        # reaches backend-dev (on a2uiplatform-net)
      - observability  # reaches loki + tempo
    restart: unless-stopped

  # ── Grafana Loki (log aggregation) ─────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/loki-config.yaml
      - loki_data:/loki
    networks:
      - observability
    restart: unless-stopped

  # ── Grafana Tempo (distributed tracing) ────────────────────────────────────
  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # HTTP API (Grafana queries traces here)
    networks:
      - observability
    restart: unless-stopped

  # ── Prometheus (metrics scrape) ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"  # enables exemplar ingestion
      - "--enable-feature=exemplar-storage"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - default        # scrapes backend-dev:8000 and otel-collector:8888
      - observability
    restart: unless-stopped

  # ── Grafana (dashboards) ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"   # 3001 to avoid clash with Next.js on 3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards   # provisioned JSON dashboards
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor traceToMetrics
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    depends_on:
      - loki
      - tempo
      - prometheus
    networks:
      - observability
    restart: unless-stopped

  # ── Backend override: inject OTel env vars ─────────────────────────────────
  backend-dev:
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=synapse-backend
      - SERVICE_VERSION=1.0.0
      - DEPLOYMENT_ENVIRONMENT=development
      - LOG_LEVEL=INFO
    depends_on:
      - otel-collector

  # ── Frontend override: add OTel collector URL so API routes can forward logs ─
  # frontend-dev joins the observability network so it can reach otel-collector
  # by hostname. OTEL_COLLECTOR_URL is read by /api/telemetry/log route.
  frontend-dev:
    environment:
      - OTEL_COLLECTOR_URL=http://otel-collector:4318
    networks:
      - default
      - observability
    depends_on:
      - otel-collector

volumes:
  loki_data:
  tempo_data:
  grafana_data:
  prometheus_data:

networks:
  observability:
    driver: bridge
  # `default` is intentionally NOT redeclared here — it is already defined in
  # docker-compose.yml as name: a2uiplatform-net and is inherited by the merge.
