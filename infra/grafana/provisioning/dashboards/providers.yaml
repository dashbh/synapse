apiVersion: 1

providers:
  - name: synapse-dashboards
    orgId: 1
    type: file
    disableDeletion: false       # dashboards deleted in UI stay deleted (not re-imported)
    updateIntervalSeconds: 30    # hot-reload JSON files — edit file, see change in 30s
    allowUiUpdates: true         # allow editing provisioned dashboards in the UI
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
